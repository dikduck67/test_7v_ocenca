<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценка фруктов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .user-section {
            margin-bottom: 30px;
        }

        .user-section label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .user-section input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        .user-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .fruits-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .fruit-card {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .fruit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .fruit-card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .fruit-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .rating {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .rating label {
            color: #666;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .rating input {
            width: 80px;
            padding: 8px;
            text-align: center;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .rating input:focus {
            outline: none;
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 25px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        .admin-panel {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            border-radius: 15px;
            padding: 20px;
            display: none;
            color: white;
        }

        .admin-panel.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        .admin-panel h2 {
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .stats-table th {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .stats-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-table tr:last-child td {
            border-bottom: none;
        }

        .clear-btn {
            background: rgba(231, 76, 60, 0.8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .clear-btn:hover {
            background: rgb(231, 76, 60);
        }

        .total-stats {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .total-stat {
            text-align: center;
        }

        .total-stat .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .total-stat .value {
            font-size: 1.8em;
            font-weight: bold;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .greeting {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #555;
            text-align: center;
        }

        .ratings-summary {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .rating-item {
            text-align: center;
        }

        .rating-item span {
            display: block;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .rating-item strong {
            font-size: 1.3em;
            color: #667eea;
        }

        .average-rating {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(0, 0, 0, 0.1);
        }

        .average-rating h3 {
            color: #333;
            font-size: 1.3em;
        }

        .average-rating .score {
            font-size: 2em;
            font-weight: bold;
            color: #764ba2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .fruits-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            .stats-table {
                font-size: 0.9em;
            }
        }

        .delete-entry {
            color: #ff6b6b;
            cursor: pointer;
            font-weight: bold;
            padding: 0 5px;
        }

        .delete-entry:hover {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 Оцените фрукты 🍊</h1>
        
        <div class="user-section">
            <label for="userName">👤 Ваше имя:</label>
            <input type="text" id="userName" placeholder="Введите ваше имя" maxlength="30">
        </div>

        <div class="fruits-grid">
            <div class="fruit-card">
                <img src="https://emojicdn.elk.sh/🍎?style=google" alt="Яблоко">
                <h3>Яблоко</h3>
                <div class="rating">
                    <label for="appleRating">Оценка (0-10):</label>
                    <input type="number" id="appleRating" min="0" max="10" value="8" step="0.5">
                </div>
            </div>

            <div class="fruit-card">
                <img src="https://emojicdn.elk.sh/🍐?style=google" alt="Груша">
                <h3>Груша</h3>
                <div class="rating">
                    <label for="pearRating">Оценка (0-10):</label>
                    <input type="number" id="pearRating" min="0" max="10" value="7" step="0.5">
                </div>
            </div>

            <div class="fruit-card">
                <img src="https://emojicdn.elk.sh/🍊?style=google" alt="Апельсин">
                <h3>Апельсин</h3>
                <div class="rating">
                    <label for="orangeRating">Оценка (0-10):</label>
                    <input type="number" id="orangeRating" min="0" max="10" value="9" step="0.5">
                </div>
            </div>
        </div>

        <button onclick="submitRatings()">📊 Показать результаты</button>

        <div class="result" id="result">
            <h2>Результаты оценки</h2>
            <div class="greeting" id="greeting"></div>
            <div class="ratings-summary">
                <div class="rating-item">
                    <span>🍎 Яблоко</span>
                    <strong id="appleResult">0</strong>
                </div>
                <div class="rating-item">
                    <span>🍐 Груша</span>
                    <strong id="pearResult">0</strong>
                </div>
                <div class="rating-item">
                    <span>🍊 Апельсин</span>
                    <strong id="orangeResult">0</strong>
                </div>
            </div>
            <div class="average-rating">
                <h3>Средняя оценка</h3>
                <div class="score" id="averageScore">0</div>
            </div>
        </div>

        <div class="admin-panel" id="adminPanel">
            <h2>🔐 Панель администратора</h2>
            <div id="statsContainer"></div>
            <button class="clear-btn" onclick="clearAllData()">🗑️ Очистить все данные</button>
        </div>
    </div>

    <script>
        // Загрузка данных из localStorage
        function loadAllRatings() {
            const saved = localStorage.getItem('fruitRatings');
            return saved ? JSON.parse(saved) : [];
        }

        // Сохранение новой оценки
        function saveRating(userName, apple, pear, orange) {
            const ratings = loadAllRatings();
            const timestamp = new Date().toLocaleString('ru-RU');
            
            ratings.push({
                id: Date.now(),
                name: userName || 'Гость',
                apple: apple,
                pear: pear,
                orange: orange,
                average: ((apple + pear + orange) / 3).toFixed(1),
                date: timestamp
            });
            
            localStorage.setItem('fruitRatings', JSON.stringify(ratings));
        }

        // Удаление записи по ID
        function deleteEntry(id) {
            let ratings = loadAllRatings();
            ratings = ratings.filter(r => r.id !== id);
            localStorage.setItem('fruitRatings', JSON.stringify(ratings));
            showAllStats(); // Обновляем отображение
        }

        // Очистка всех данных
        function clearAllData() {
            if (confirm('Вы уверены, что хотите удалить ВСЕ данные? Это действие нельзя отменить!')) {
                localStorage.removeItem('fruitRatings');
                showAllStats();
            }
        }

        // Отображение статистики
        function showAllStats() {
            const ratings = loadAllRatings();
            const adminPanel = document.getElementById('adminPanel');
            const resultBlock = document.getElementById('result');
            const statsContainer = document.getElementById('statsContainer');
            
            // Скрываем обычный результат, показываем админ-панель
            resultBlock.classList.remove('show');
            adminPanel.classList.add('show');
            
            if (ratings.length === 0) {
                statsContainer.innerHTML = '<p style="text-align: center; padding: 20px;">Нет сохраненных оценок</p>';
                return;
            }
            
            // Сортируем по дате (новые сверху)
            ratings.sort((a, b) => b.id - a.id);
            
            // Создаем таблицу
            let html = '<table class="stats-table">';
            html += '<thead><tr><th>Имя</th><th>🍎</th><th>🍐</th><th>🍊</th><th>Ср.</th><th>Дата</th><th></th></tr></thead><tbody>';
            
            ratings.forEach(entry => {
                html += `<tr>
                    <td>${escapeHtml(entry.name)}</td>
                    <td>${entry.apple.toFixed(1)}</td>
                    <td>${entry.pear.toFixed(1)}</td>
                    <td>${entry.orange.toFixed(1)}</td>
                    <td><strong>${entry.average}</strong></td>
                    <td>${entry.date || 'Неизвестно'}</td>
                    <td><span class="delete-entry" onclick="deleteEntry(${entry.id})" title="Удалить запись">✖</span></td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            
            // Вычисляем общую статистику
            const totalApple = ratings.reduce((sum, r) => sum + r.apple, 0);
            const totalPear = ratings.reduce((sum, r) => sum + r.pear, 0);
            const totalOrange = ratings.reduce((sum, r) => sum + r.orange, 0);
            const count = ratings.length;
            
            html += '<div class="total-stats">';
            html += `<div class="total-stat"><div class="label">Всего оценок</div><div class="value">${count}</div></div>`;
            html += `<div class="total-stat"><div class="label">🍎 Среднее</div><div class="value">${(totalApple / count).toFixed(1)}</div></div>`;
            html += `<div class="total-stat"><div class="label">🍐 Среднее</div><div class="value">${(totalPear / count).toFixed(1)}</div></div>`;
            html += `<div class="total-stat"><div class="label">🍊 Среднее</div><div class="value">${(totalOrange / count).toFixed(1)}</div></div>`;
            html += `<div class="total-stat"><div class="label">Общий рейтинг</div><div class="value">${((totalApple + totalPear + totalOrange) / (count * 3)).toFixed(1)}</div></div>`;
            html += '</div>';
            
            statsContainer.innerHTML = html;
            
            // Прокручиваем к панели
            setTimeout(() => {
                adminPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // Защита от XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function submitRatings() {
            const userName = document.getElementById('userName').value.trim();
            const appleRating = parseFloat(document.getElementById('appleRating').value) || 0;
            const pearRating = parseFloat(document.getElementById('pearRating').value) || 0;
            const orangeRating = parseFloat(document.getElementById('orangeRating').value) || 0;

            // Проверка на секретный код
            if (userName === '5267') {
                showAllStats();
                return;
            }

            // Проверка оценок
            const ratings = [appleRating, pearRating, orangeRating];
            for (let rating of ratings) {
                if (rating < 0 || rating > 10) {
                    alert('Оценки должны быть от 0 до 10!');
                    return;
                }
            }

            // Сохраняем оценку
            saveRating(userName, appleRating, pearRating, orangeRating);

            // Показываем обычный результат
            const greeting = userName === '' ? 'Здравствуйте, гость!' : `Здравствуйте, ${userName}!`;
            const average = ((appleRating + pearRating + orangeRating) / 3).toFixed(1);

            document.getElementById('greeting').textContent = greeting;
            document.getElementById('appleResult').textContent = appleRating.toFixed(1);
            document.getElementById('pearResult').textContent = pearRating.toFixed(1);
            document.getElementById('orangeResult').textContent = orangeRating.toFixed(1);
            document.getElementById('averageScore').textContent = average;

            const resultBlock = document.getElementById('result');
            const adminPanel = document.getElementById('adminPanel');
            
            resultBlock.classList.add('show');
            adminPanel.classList.remove('show');

            setTimeout(() => {
                resultBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                submitRatings();
            }
        });

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('change', function() {
                let value = parseFloat(this.value);
                if (value < 0) this.value = 0;
                if (value > 10) this.value = 10;
                if (isNaN(value)) this.value = 5;
            });
        });
    </script>
</body>
</html>
