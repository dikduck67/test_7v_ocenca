<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценка фруктов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .user-section {
            margin-bottom: 30px;
        }

        .user-section label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .user-section input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
        }

        .user-section input:focus {
            outline: none;
            border-color: #667eea;
        }

        .fruits-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .fruit-card {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .fruit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .fruit-card img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .fruit-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .rating {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .rating label {
            color: #666;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .rating input {
            width: 80px;
            padding: 8px;
            text-align: center;
            font-size: 1em;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .rating input:focus {
            outline: none;
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 25px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .greeting {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #555;
            text-align: center;
        }

        .ratings-summary {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .rating-item {
            text-align: center;
        }

        .rating-item span {
            display: block;
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .rating-item strong {
            font-size: 1.3em;
            color: #667eea;
        }

        .average-rating {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(0, 0, 0, 0.1);
        }

        .average-rating h3 {
            color: #333;
            font-size: 1.3em;
        }

        .average-rating .score {
            font-size: 2em;
            font-weight: bold;
            color: #764ba2;
        }

        /* Для мобильных устройств */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .fruits-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 Оцените фрукты 🍊</h1>
        
        <!-- Поле для ввода имени -->
        <div class="user-section">
            <label for="userName">👤 Ваше имя:</label>
            <input type="text" id="userName" placeholder="Введите ваше имя" maxlength="30">
        </div>

        <!-- Карточки с фруктами -->
        <div class="fruits-grid">
            <!-- Яблоко -->
            <div class="fruit-card">
                <img src="https://emojicdn.elk.sh/🍎?style=google" alt="Яблоко">
                <h3>Яблоко</h3>
                <div class="rating">
                    <label for="appleRating">Оценка (0-10):</label>
                    <input type="number" id="appleRating" min="0" max="10" value="8" step="0.5">
                </div>
            </div>

            <!-- Груша -->
            <div class="fruit-card">
                <img src="https://emojicdn.elk.sh/🍐?style=google" alt="Груша">
                <h3>Груша</h3>
                <div class="rating">
                    <label for="pearRating">Оценка (0-10):</label>
                    <input type="number" id="pearRating" min="0" max="10" value="7" step="0.5">
                </div>
            </div>

            <!-- Апельсин -->
            <div class="fruit-card">
                <img src="https://emojicdn.elk.sh/🍊?style=google" alt="Апельсин">
                <h3>Апельсин</h3>
                <div class="rating">
                    <label for="orangeRating">Оценка (0-10):</label>
                    <input type="number" id="orangeRating" min="0" max="10" value="9" step="0.5">
                </div>
            </div>
        </div>

        <!-- Кнопка отправки -->
        <button onclick="submitRatings()">📊 Показать результаты</button>

        <!-- Блок с результатами -->
        <div class="result" id="result">
            <h2>Результаты оценки</h2>
            <div class="greeting" id="greeting"></div>
            <div class="ratings-summary">
                <div class="rating-item">
                    <span>🍎 Яблоко</span>
                    <strong id="appleResult">0</strong>
                </div>
                <div class="rating-item">
                    <span>🍐 Груша</span>
                    <strong id="pearResult">0</strong>
                </div>
                <div class="rating-item">
                    <span>🍊 Апельсин</span>
                    <strong id="orangeResult">0</strong>
                </div>
            </div>
            <div class="average-rating">
                <h3>Средняя оценка</h3>
                <div class="score" id="averageScore">0</div>
            </div>
        </div>
    </div>

    <script>
        function submitRatings() {
            // Получаем имя пользователя
            const userName = document.getElementById('userName').value.trim();
            
            // Получаем оценки
            const appleRating = parseFloat(document.getElementById('appleRating').value) || 0;
            const pearRating = parseFloat(document.getElementById('pearRating').value) || 0;
            const orangeRating = parseFloat(document.getElementById('orangeRating').value) || 0;

            // Проверяем, что оценки в допустимом диапазоне
            const ratings = [appleRating, pearRating, orangeRating];
            for (let rating of ratings) {
                if (rating < 0 || rating > 10) {
                    alert('Оценки должны быть от 0 до 10!');
                    return;
                }
            }

            // Формируем приветствие
            let greeting;
            if (userName === '') {
                greeting = 'Здравствуйте, гость!';
            } else {
                greeting = `Здравствуйте, ${userName}!`;
            }

            // Вычисляем среднюю оценку
            const average = ((appleRating + pearRating + orangeRating) / 3).toFixed(1);

            // Отображаем результаты
            document.getElementById('greeting').textContent = greeting;
            document.getElementById('appleResult').textContent = appleRating.toFixed(1);
            document.getElementById('pearResult').textContent = pearRating.toFixed(1);
            document.getElementById('orangeResult').textContent = orangeRating.toFixed(1);
            document.getElementById('averageScore').textContent = average;

            // Показываем блок с результатами
            const resultBlock = document.getElementById('result');
            resultBlock.classList.add('show');

            // Плавно прокручиваем к результатам
            setTimeout(() => {
                resultBlock.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        // Добавляем обработчик Enter для удобства
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                submitRatings();
            }
        });

        // Валидация ввода оценок
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('change', function() {
                let value = parseFloat(this.value);
                if (value < 0) this.value = 0;
                if (value > 10) this.value = 10;
                if (isNaN(value)) this.value = 5;
            });
        });

        // Если имя уже было введено ранее (например, из localStorage)
        window.addEventListener('load', function() {
            // Можно добавить автоматическую загрузку сохраненных данных
            console.log('Страница загружена! Введите имя и оцените фрукты.');
        });
    </script>
</body>
</html>
